# PostgreSQL 18 tuning profile
# DB Type: mixed
# Total Memory (RAM): 32 GB
# CPUs num: 16
# Connections num: 100
# Data Storage: ssd

max_connections = '100'
shared_buffers = '8GB'
effective_cache_size = '24GB'
maintenance_work_mem = '2GB'
checkpoint_completion_target = '0.9'
wal_buffers = '16MB'
default_statistics_target = '100'
random_page_cost = '1.1'
effective_io_concurrency = '200'
work_mem = '36157kB'
huge_pages = 'try'
jit = 'off'
autovacuum_max_workers = '4'
autovacuum_work_mem = '2GB'
io_workers = '4'
min_wal_size = '1GB'
max_wal_size = '4GB'
max_worker_processes = '16'
max_parallel_workers_per_gather = '4'
max_parallel_workers = '16'
max_parallel_maintenance_workers = '4'

# Requires PostgreSQL to be compiled with --with-lz4.
wal_compression = 'lz4'

# Requires PostgreSQL to be compiled with --with-liburing.
io_method = 'io_uring'
