services:
  postgres:
    container_name: ${CONTAINER_NAME:-minir-pg}
    image: ${POSTGRES_IMAGE:-minir-pg:latest}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_CONFIG_FILE: /runtime/postgresql.conf
      POSTGRES_FALLBACK_CONFIG_FILE: /etc/postgresql/postgresql.conf
      AGENSGRAPH_GRAPH_PATH: /runtime/agensgraph
      # Keep PGDATA in a child directory so the host runtime directory can also
      # hold the compose file and the custom postgresql.conf without breaking initdb.
      PGDATA: /runtime/pgdata
    ports:
      - "${HOST_PORT:-5433}:5432"
    volumes:
      - type: bind
        source: .
        target: /runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
